version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: firealarm_postgres
    environment:
      POSTGRES_USER: fireuser
      POSTGRES_PASSWORD: firepassword
      POSTGRES_DB: firedb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: firealarm_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - ./mosquitto/config:/mosquitto/config
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: firealarm_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: firealarm_org
      DOCKER_INFLUXDB_INIT_BUCKET: firealarm_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-super-secret-token-123
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped

volumes:
  postgres-data:
  mosquitto-data:
  influxdb-data:
